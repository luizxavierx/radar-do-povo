version: "3.9"

services:
  redis:
    image: redis:7.2-alpine
    container_name: api-radar-redis
    command: >
      redis-server
      --appendonly yes
      --save 60 1000
      --requirepass ${REDIS_PASSWORD}
    ports:
      - "26739:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  redis_data:

<VirtualHost *:80>
    ServerName radardopovo.com
    ServerAlias www.radardopovo.com

    DocumentRoot /www/wwwroot/radardopovo.com/dist

    <Directory /www/wwwroot/radardopovo.com/dist>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ProxyPreserveHost On
    ProxyRequests Off
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Host "radardopovo.com"

    ProxyPass /graphql http://127.0.0.1:8081/graphql
    ProxyPassReverse /graphql http://127.0.0.1:8081/graphql

    ProxyPass /api/ http://127.0.0.1:8081/api/
    ProxyPassReverse /api/ http://127.0.0.1:8081/api/

    ProxyPass /healthz http://127.0.0.1:8081/healthz
    ProxyPassReverse /healthz http://127.0.0.1:8081/healthz

    RewriteEngine On
    RewriteCond %{REQUEST_URI} !^/(api/|graphql$|healthz$)
    RewriteCond %{REQUEST_FILENAME} !-f
    RewriteCond %{REQUEST_FILENAME} !-d
    RewriteRule ^ /index.html [L]

    ErrorLog ${APACHE_LOG_DIR}/radardopovo-error.log
    CustomLog ${APACHE_LOG_DIR}/radardopovo-access.log combined
</VirtualHost>

<VirtualHost *:80>
    ServerName api.radardopovo.com
    RedirectMatch 308 ^/(.*)$ https://radardopovo.com/$1
</VirtualHost>

"""
Schema GraphQL principal da API Radar do Povo.
"""
scalar DateTime @scalar(class: "Nuwave\\Lighthouse\\Schema\\Types\\Scalars\\DateTime")
scalar Date @scalar(class: "Nuwave\\Lighthouse\\Schema\\Types\\Scalars\\Date")
scalar BigInt @scalar(class: "App\\GraphQL\\Scalars\\BigInt")

type Query {
  politico(id: ID, nomeCanonico: String): Politico
    @field(resolver: "App\\GraphQL\\Queries\\PoliticoQuery@politico")

  politicos(filter: PoliticoFilterInput, pagination: PaginationInput): PoliticoConnection!
    @field(resolver: "App\\GraphQL\\Queries\\PoliticoQuery@politicos")

  gastosPolitico(input: GastoPoliticoInput!): GastoResumo!
    @field(resolver: "App\\GraphQL\\Queries\\GastoQuery@gastosPolitico")

  viagensPolitico(input: ViagensPoliticoInput!, pagination: PaginationInput): ViagemConnection!
    @field(resolver: "App\\GraphQL\\Queries\\ViagemQuery@viagensPolitico")

  resumoViagens(filtro: RankingViagemFiltroInput): ResumoViagensPainel!
    @field(resolver: "App\\GraphQL\\Queries\\ViagemQuery@resumoViagens")

  viagensPainel(filtro: RankingViagemFiltroInput, pagination: PaginationInput): ViagemConnection!
    @field(resolver: "App\\GraphQL\\Queries\\ViagemQuery@viagensPainel")

  topViajantes(filtro: RankingViagemFiltroInput, pagination: PaginationInput): TopViagemPessoaConnection!
    @field(resolver: "App\\GraphQL\\Queries\\ViagemQuery@topViajantes")

  topGastadoresViagens(filtro: RankingViagemFiltroInput, pagination: PaginationInput): TopViagemPessoaConnection!
    @field(resolver: "App\\GraphQL\\Queries\\ViagemQuery@topGastadoresViagens")

  topViajantesAno(ano: Int!, pagination: PaginationInput): TopViagemPessoaConnection!
    @field(resolver: "App\\GraphQL\\Queries\\ViagemQuery@topViajantesAno")

  topGastadoresViagensAno(ano: Int!, pagination: PaginationInput): TopViagemPessoaConnection!
    @field(resolver: "App\\GraphQL\\Queries\\ViagemQuery@topGastadoresViagensAno")

  topDeputadosViajantesAno(ano: Int!, pagination: PaginationInput): TopViagemPessoaConnection!
    @field(resolver: "App\\GraphQL\\Queries\\ViagemQuery@topDeputadosViajantesAno")

  topSenadoresViajantesAno(ano: Int!, pagination: PaginationInput): TopViagemPessoaConnection!
    @field(resolver: "App\\GraphQL\\Queries\\ViagemQuery@topSenadoresViajantesAno")

  topDeputadosGastadoresViagensAno(ano: Int!, pagination: PaginationInput): TopViagemPessoaConnection!
    @field(resolver: "App\\GraphQL\\Queries\\ViagemQuery@topDeputadosGastadoresViagensAno")

  topSenadoresGastadoresViagensAno(ano: Int!, pagination: PaginationInput): TopViagemPessoaConnection!
    @field(resolver: "App\\GraphQL\\Queries\\ViagemQuery@topSenadoresGastadoresViagensAno")

  topOrgaosSuperioresViagens(filtro: RankingViagemFiltroInput, pagination: PaginationInput): TopViagemOrgaoConnection!
    @field(resolver: "App\\GraphQL\\Queries\\ViagemQuery@topOrgaosSuperioresViagens")

  topOrgaosSolicitantesViagens(filtro: RankingViagemFiltroInput, pagination: PaginationInput): TopViagemOrgaoConnection!
    @field(resolver: "App\\GraphQL\\Queries\\ViagemQuery@topOrgaosSolicitantesViagens")

  emendasResumoPolitico(input: EmendasPoliticoInput!): EmendaResumo!
    @field(resolver: "App\\GraphQL\\Queries\\EmendaQuery@emendasResumoPolitico")

  emendasPolitico(input: EmendasPoliticoInput!, pagination: PaginationInput): EmendaConnection!
    @field(resolver: "App\\GraphQL\\Queries\\EmendaQuery@emendasPolitico")

  topGastadoresEmendas(filtro: RankingEmendaFiltroInput, pagination: PaginationInput): TopEmendaGastadorConnection!
    @field(resolver: "App\\GraphQL\\Queries\\EmendaQuery@topGastadoresEmendas")

  topGastadoresEmendasAno(ano: Int!, pagination: PaginationInput): TopEmendaGastadorConnection!
    @field(resolver: "App\\GraphQL\\Queries\\EmendaQuery@topGastadoresEmendasAno")

  topDeputadosEmendasAno(ano: Int!, pagination: PaginationInput): TopEmendaGastadorConnection!
    @field(resolver: "App\\GraphQL\\Queries\\EmendaQuery@topDeputadosEmendasAno")

  topSenadoresEmendasAno(ano: Int!, pagination: PaginationInput): TopEmendaGastadorConnection!
    @field(resolver: "App\\GraphQL\\Queries\\EmendaQuery@topSenadoresEmendasAno")

  topEmendasPorPais(filtro: RankingEmendaFiltroInput, pagination: PaginationInput): TopEmendaPaisConnection!
    @field(resolver: "App\\GraphQL\\Queries\\EmendaQuery@topEmendasPorPais")

  topEmendasPorPaisAno(ano: Int!, pagination: PaginationInput): TopEmendaPaisConnection!
    @field(resolver: "App\\GraphQL\\Queries\\EmendaQuery@topEmendasPorPaisAno")

  health: HealthStatus!
    @field(resolver: "App\\GraphQL\\Queries\\HealthQuery@health")
}

input PoliticoFilterInput {
  search: String
  partido: String
  uf: String
  cargoAtual: String
}

input GastoFiltroInput {
  anoInicio: Int
  anoFim: Int
}

input GastoPoliticoInput {
  politicoId: ID!
  filtro: GastoFiltroInput
}

input ViagensPoliticoInput {
  politicoId: ID!
  anoInicio: Int
  anoFim: Int
}

input EmendaFiltroInput {
  anoInicio: Int
  anoFim: Int
  uf: String
  tipoEmenda: String
  pais: String
  apenasParlamentares: Boolean
}

input RankingEmendaFiltroInput {
  anoInicio: Int
  anoFim: Int
  uf: String
  tipoEmenda: String
  pais: String
  apenasParlamentares: Boolean = true
  cargoParlamentar: CargoParlamentarFiltro
}

input RankingViagemFiltroInput {
  anoInicio: Int
  anoFim: Int
  orgaoSuperiorCodigo: String
  orgaoSolicitanteCodigo: String
  search: String
  situacao: String
  processoId: String
  pcdp: String
  cpfViajante: String
  nomeViajante: String
  cargo: String
  funcao: String
  destino: String
  motivo: String
  apenasParlamentares: Boolean = false
  cargoParlamentar: CargoParlamentarFiltro
}

enum CargoParlamentarFiltro {
  DEPUTADO
  SENADOR
}

input EmendasPoliticoInput {
  politicoId: ID!
  filtro: EmendaFiltroInput
}

input PaginationInput {
  limit: Int = 20
  offset: Int = 0
}

type PoliticoConnection {
  nodes: [Politico!]!
  total: Int!
  limit: Int!
  offset: Int!
}

type ViagemConnection {
  nodes: [Viagem!]!
  total: Int!
  limit: Int!
  offset: Int!
}

type EmendaConnection {
  nodes: [Emenda!]!
  total: Int!
  limit: Int!
  offset: Int!
}

type PassagemConnection {
  nodes: [Passagem!]!
  total: Int!
  limit: Int!
  offset: Int!
}

type PagamentoConnection {
  nodes: [Pagamento!]!
  total: Int!
  limit: Int!
  offset: Int!
}

type TrechoConnection {
  nodes: [Trecho!]!
  total: Int!
  limit: Int!
  offset: Int!
}

type EmendaConvenioConnection {
  nodes: [EmendaConvenio!]!
  total: Int!
  limit: Int!
  offset: Int!
}

type EmendaFavorecidoConnection {
  nodes: [EmendaFavorecido!]!
  total: Int!
  limit: Int!
  offset: Int!
}

type TopEmendaGastadorConnection {
  nodes: [TopEmendaGastador!]!
  total: Int!
  limit: Int!
  offset: Int!
}

type TopEmendaPaisConnection {
  nodes: [TopEmendaPais!]!
  total: Int!
  limit: Int!
  offset: Int!
}

type TopViagemPessoaConnection {
  nodes: [TopViagemPessoa!]!
  total: Int!
  limit: Int!
  offset: Int!
}

type TopViagemOrgaoConnection {
  nodes: [TopViagemOrgao!]!
  total: Int!
  limit: Int!
  offset: Int!
}

type Politico {
  id: ID!
  nomeBusca: String @rename(attribute: "nome_busca")
  nomeCanonico: String! @rename(attribute: "nome_canonico")
  nomeCompleto: String @rename(attribute: "nome_completo")
  resumo: String
  fotoUrl: String @rename(attribute: "foto_url")
  wikipediaUrl: String @rename(attribute: "wikipedia_url")
  camaraUrl: String @rename(attribute: "camara_url")
  tseUrl: String @rename(attribute: "tse_url")
  globoUrl: String @rename(attribute: "globo_url")
  partido: String
  cargoAtual: String @rename(attribute: "cargo_atual")
  uf: String
  dataNascimento: Date @rename(attribute: "data_nascimento")
  nacionalidade: String
  fontePrincipal: String @rename(attribute: "fonte_principal")
  fontesJson: String @rename(attribute: "fontes_json")
  dadosBrutosJson: String @rename(attribute: "dados_brutos_json")
  createdAt: DateTime! @rename(attribute: "created_at")
  updatedAt: DateTime! @rename(attribute: "updated_at")

  gastos(filtro: GastoFiltroInput): GastoResumo!
    @field(resolver: "App\\GraphQL\\Resolvers\\PoliticoFieldResolver@gastos")

  perfilExterno: PerfilExterno!
    @field(resolver: "App\\GraphQL\\Resolvers\\PoliticoFieldResolver@perfilExterno")

  viagens(anoInicio: Int, anoFim: Int, pagination: PaginationInput): ViagemConnection!
    @field(resolver: "App\\GraphQL\\Resolvers\\PoliticoFieldResolver@viagens")

  emendasResumo(filtro: EmendaFiltroInput): EmendaResumo!
    @field(resolver: "App\\GraphQL\\Resolvers\\PoliticoFieldResolver@emendasResumo")

  emendas(filtro: EmendaFiltroInput, pagination: PaginationInput): EmendaConnection!
    @field(resolver: "App\\GraphQL\\Resolvers\\PoliticoFieldResolver@emendas")
}

type Viagem {
  processoId: String! @rename(attribute: "processo_id")
  pcdp: String
  situacao: String
  viagemUrgente: String @rename(attribute: "viagem_urgente")
  justificativaUrgencia: String @rename(attribute: "justificativa_urgencia")
  orgaoSuperiorCodigo: String @rename(attribute: "orgao_superior_codigo")
  orgaoSuperiorNome: String @rename(attribute: "orgao_superior_nome")
  orgaoSolicitanteCodigo: String @rename(attribute: "orgao_solicitante_codigo")
  orgaoSolicitanteNome: String @rename(attribute: "orgao_solicitante_nome")
  cpfViajante: String @rename(attribute: "cpf_viajante")
  nomeViajante: String @rename(attribute: "nome_viajante")
  cargo: String
  funcao: String
  descricaoFuncao: String @rename(attribute: "descricao_funcao")
  dataInicio: Date @rename(attribute: "data_inicio")
  dataFim: Date @rename(attribute: "data_fim")
  destinos: String
  motivo: String
  valorDiariasCents: BigInt! @rename(attribute: "valor_diarias_cents")
  valorPassagensCents: BigInt! @rename(attribute: "valor_passagens_cents")
  valorDevolucaoCents: BigInt! @rename(attribute: "valor_devolucao_cents")
  valorOutrosGastosCents: BigInt! @rename(attribute: "valor_outros_gastos_cents")
  ano: Int!
  importedAt: DateTime @rename(attribute: "imported_at")

  passagens(pagination: PaginationInput): PassagemConnection!
    @field(resolver: "App\\GraphQL\\Resolvers\\ViagemFieldResolver@passagens")

  pagamentos(pagination: PaginationInput): PagamentoConnection!
    @field(resolver: "App\\GraphQL\\Resolvers\\ViagemFieldResolver@pagamentos")

  trechos(pagination: PaginationInput): TrechoConnection!
